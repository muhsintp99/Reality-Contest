        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .glow-border {
        position: relative;
      }
      .glow-border::after {
        content: '';
        position: absolute;
        inset: -1px;
        background: linear-gradient(90deg, #7c3aed, #06b6d4, #f59e0b, #7c3aed);
        background-size: 400% 400%;
        border-radius: inherit;
        z-index: -1;
        opacity: 0;
        transition: opacity 0.3s ease;
        animation: borderGlow 8s linear infinite;
      }
      .glow-border:hover::after {
        opacity: 1;
      }

      @keyframes borderGlow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      #particle-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }
      
      .animate-float {
        animation: float 5s ease-in-out infinite;
      }
      .animate-float-delayed {
        animation: float 5s ease-in-out infinite 2.5s;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }

      // ==========================================
      // 4. ANIMATED CANVAS PARTICLE COMPONENT
      // ==========================================
      let particleCleanup = null;
      function initParticles() {
        if (particleCleanup) particleCleanup();
        
        const canvas = document.getElementById('particle-canvas');
        if (!canvas) return;

        const ctx = canvas.getContext('2d');
        let animationFrameId;

        const handleResize = () => {
          canvas.width = canvas.parentElement.offsetWidth;
          canvas.height = canvas.parentElement.offsetHeight;
        };
        window.addEventListener('resize', handleResize);
        handleResize();

        const particlesArray = [];
        const numberOfParticles = 80;

        class Particle {
          constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 1;
            this.speedX = Math.random() * 0.4 - 0.2;
            this.speedY = Math.random() * 0.4 - 0.2;
            this.color = `rgba(124, 58, 237, ${Math.random() * 0.3 + 0.15})`;
          }
          update() {
            this.x += this.speedX;
            this.y += this.speedY;

            if (this.x < 0 || this.x > canvas.width) this.speedX = -this.speedX;
            if (this.y < 0 || this.y > canvas.height) this.speedY = -this.speedY;
          }
          draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
          }
        }

        for (let i = 0; i < numberOfParticles; i++) {
          particlesArray.push(new Particle());
        }

        function connect() {
          let opacityValue = 1;
          for (let a = 0; a < particlesArray.length; a++) {
            for (let b = a; b < particlesArray.length; b++) {
              let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
              if (distance < (canvas.width / 8) * (canvas.height / 8)) {
                opacityValue = 1 - (distance / 20000);
                ctx.strokeStyle = `rgba(124, 58, 237, ${opacityValue * 0.08})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                ctx.stroke();
              }
            }
          }
        }

        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (let i = 0; i < particlesArray.length; i++) {
            particlesArray[i].update();
            particlesArray[i].draw();
          }
          connect();
          animationFrameId = requestAnimationFrame(animate);
        }

        animate();

        particleCleanup = () => {
          window.removeEventListener('resize', handleResize);
          cancelAnimationFrame(animationFrameId);
        };
      }

                  <div>
                    <label class="block text-slate-400 mb-1.5 font-bold uppercase tracking-wider text-[10px]">Biometric Selfie Capture (Liveness Check)</label>
                    <div class="bg-slate-950/80 border border-slate-900 rounded-2xl p-6 text-center flex flex-col justify-center items-center min-h-[230px] space-y-4">
                      <div id="kyc-selfie-placeholder" class="space-y-3">
                        <div class="w-14 h-14 rounded-full bg-slate-900 border border-slate-800 flex items-center justify-center text-slate-500 mx-auto">
                          ${getIcon('profile', 'w-6 h-6')}
                        </div>
                        <p class="text-[10px] text-slate-500 max-w-xs mx-auto">AI scanners will match your face snap against the document. Ensure adequate lighting.</p>
                      </div>
                      <img id="kyc-selfie-preview" class="hidden w-24 h-24 rounded-full object-cover border-2 border-cyan-500 bg-slate-900 mx-auto" />
                      
                      <button type="button" onclick="simulateKycSelfieCapture()" class="px-3.5 py-2 bg-slate-900 hover:bg-slate-850 border border-slate-800 rounded-xl text-xs font-semibold flex items-center gap-1.5">
                        ${getIcon('reels', 'w-4 h-4 text-cyan-400')}
                        <span id="selfie-btn-txt">Capture Live Snap</span>
                      </button>
                    </div>
                  </div>

                </div>

                <div class="pt-6 border-t border-slate-900 text-right">
                  <button type="submit" class="px-6 py-2.5 bg-purple-600 hover:bg-purple-500 rounded-xl text-xs font-bold shadow-lg shadow-purple-900/30">
                    Submit Verification Application
                  </button>
                </div>
              </form>
            </div>
          </div>
        `;
      }

      window.simulateKycDocUpload = function() {
        const ind = document.getElementById('kyc-upload-indicator');
        if (ind) {
          ind.classList.remove('hidden');
        }
      };

      window.simulateKycSelfieCapture = function() {
        const pre = document.getElementById('kyc-selfie-preview');
        const hold = document.getElementById('kyc-selfie-placeholder');
        const txt = document.getElementById('selfie-btn-txt');
        if (pre && hold && txt) {
          pre.src = `https://api.dicebear.com/7.x/avataaars/svg?seed=Selfie-${Math.floor(Math.random()*900)}`;
          pre.classList.remove('hidden');
          hold.classList.add('hidden');
          txt.innerText = 'Retake Snap';
        }
      };

      window.submitMockKyc = function(e) {
        if (e) e.preventDefault();
        const type = document.getElementById('kyc-doc-type').value;
        const num = document.getElementById('kyc-doc-num').value;
        const selfie = document.getElementById('kyc-selfie-preview').src;
        const ind = document.getElementById('kyc-upload-indicator');

        if (!ind || ind.classList.contains('hidden') || !selfie) {
          alert('Please upload document front scan and capture liveness selfie first.');
          return;
        }

        const score = Math.floor(78 + Math.random() * 21);

        state.kycRecord = {
          documentType: type,
          documentNumber: num,
          selfieUrl: selfie,
          livenessScore: score,
          status: 'Under Review',
          aiMatchResult: score >= 85 ? 'PASSED' : 'REVIEW_REQUIRED'
        };

        state.currentUser.kycStatus = 'Under Review';
        
        // Sync Admin Pending queue
        state.securityLogs.push({
          time: new Date().toTimeString().substring(0,8),
          event: `AI facial biometric match checked: ${score}% match. Marked Under Review.`,
          level: 'PASS'
        });

        alert('KYC submitted! AI systems have run a baseline face match check.');
        renderApp();
      };

      function renderSessionsViewHTML() {
        return `
          <div class="space-y-6 text-left">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
              <div>
                <h2 class="text-xl font-bold font-poppins text-white flex items-center gap-2">
                  ${getIcon('anticheat', 'w-5 h-5 text-purple-400')}
                  <span>Active Login Sessions</span>
                </h2>
                <p class="text-xs text-slate-500 font-light">Monitor and revoke devices authorized to access your platform account assets.</p>
              </div>
              
              ${state.sessionsList.length > 1 ? `
                <button onclick="logoutAllMockDevices()" class="px-3.5 py-2 bg-red-600/10 hover:bg-red-600/20 border border-red-500/20 text-red-400 hover:text-red-300 text-xs font-semibold rounded-xl transition-all">
                  Logout Other Devices
                </button>
              ` : ''}
            </div>

            <div class="glassmorphism rounded-2xl border border-slate-900 overflow-hidden divide-y divide-slate-900 shadow-xl">
              ${state.sessionsList.length === 0 ? `
                <div class="p-8 text-center text-slate-500 text-xs">No active sessions tracked.</div>
              ` : state.sessionsList.map(s => {
                const isMobile = s.device.toLowerCase().includes('mobile') || s.device.toLowerCase().includes('ios');
                return `
                  <div class="p-5 flex items-center justify-between gap-4 font-sans">
                    <div class="flex items-center gap-4">
                      <div class="p-3 bg-slate-950 border border-slate-900 text-slate-400 rounded-xl">
                        ${getIcon(isMobile ? 'profile' : 'dashboard', 'w-5 h-5')}
                      </div>
                      <div>
                        <h4 class="text-sm font-bold flex items-center gap-2">
                          <span>${s.device}</span>
                          <span class="text-[9px] bg-slate-950 text-slate-500 border border-slate-900 px-2 py-0.5 rounded font-normal font-sans uppercase">
                            ${s.browser}
                          </span>
                        </h4>
                        <div class="flex flex-wrap items-center gap-x-3 gap-y-1 text-xs text-slate-500 mt-1">
                          <span>IP: ${s.ip}</span>
                          <span>•</span>
                          <span>Sign-in: ${s.time}</span>
                        </div>
                      </div>
                    </div>

                    <button onclick="revokeMockSession('${s.id}')" class="p-2 border border-slate-900 hover:border-red-500/20 bg-slate-950 hover:bg-red-500/10 text-slate-500 hover:text-red-400 rounded-xl transition-all">
                      ${getIcon('logout', 'w-4 h-4')}
                    </button>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }

      window.revokeMockSession = function(id) {
        state.sessionsList = state.sessionsList.filter(s => s.id !== id);
        alert('Session terminated.');
        renderApp();
      };

      window.logoutAllMockDevices = function() {
        if (confirm('Logout of all other devices?')) {
          state.sessionsList = state.sessionsList.slice(0, 1);
          alert('Other active device sessions terminated.');
          renderApp();
        }
      };

      // Overwrite adminApproveKYC to support state sync
      window.adminApproveKYC = function() {
        if (state.kycRecord) {
          state.kycRecord.status = 'Approved';
        }
        state.currentUser.kycStatus = 'Verified';
        state.securityLogs.push({ time: new Date().toTimeString().substring(0,8), event: "KYC Application approval for Raj Patel by Admin panel.", level: 'PASS' });
        alert("Contestant Raj Patel's KYC documents marked approved.");
        renderApp();
      };

      // --- END OF AUTHENTICATION MODULES ---

      // ==========================================
      // 7. INITIAL BOOTSTRAPPING
      // ==========================================
      window.onload = function() {
        renderApp();
        startTestimonialSlider();
      };
    </script>
</body>
</html>
