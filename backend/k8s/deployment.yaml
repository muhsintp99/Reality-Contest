apiVersion: apps/v1
kind: Deployment
metadata:
  name: reality-contest-backend
  namespace: default
  labels:
    app: reality-contest-backend
spec:
  replicas: 3 # Start with 3 instances for high availability
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: reality-contest-backend
  template:
    metadata:
      labels:
        app: reality-contest-backend
    spec:
      containers:
        - name: backend-api
          image: reality-contest/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          resources:
            limits:
              cpu: "1"
              memory: 1024Mi
            requests:
              cpu: "500m"
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: default
data:
  NODE_ENV: "production"
  MONGODB_URI: "mongodb://mongodb-service:27017/reality_contest"
  REDIS_URL: "redis://redis-service:6379"
  PORT: "5000"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: default
type: Opaque
